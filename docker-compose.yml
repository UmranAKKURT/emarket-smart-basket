services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      EMARKET_ENV: ${EMARKET_ENV:-production}
      EMARKET_SESSION_TTL_MINUTES: ${EMARKET_SESSION_TTL_MINUTES:-60}
      EMARKET_COOKIE_SECURE: ${EMARKET_COOKIE_SECURE:-false}
      EMARKET_ALLOWED_ORIGINS: ${EMARKET_ALLOWED_ORIGINS:-http://localhost,http://localhost:5173}
      EMARKET_LOGIN_MAX_ATTEMPTS: ${EMARKET_LOGIN_MAX_ATTEMPTS:-5}
      EMARKET_LOGIN_LOCK_MINUTES: ${EMARKET_LOGIN_LOCK_MINUTES:-15}
      EMARKET_LOG_LEVEL: ${EMARKET_LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      - emarket_database:/app/database
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - emarket_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - emarket_network

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped
    networks:
      - emarket_network

volumes:
  emarket_database:

networks:
  emarket_network:
    driver: bridge
